name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4

      - name: Renovate
        uses: renovatebot/github-action@v40.3.1
        with:
          configurationFile: ./.github/renovate-config.js
          token: "${{ secrets.RENOVATE_TOKEN }}"
        env:
          LOG_LEVEL: "debug"
