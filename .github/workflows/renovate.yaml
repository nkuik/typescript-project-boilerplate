name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Renovate
        uses: renovatebot/github-action@v40.1.12
        with:
          configurationFile: ./.github/renovate-config.js
          token: "${{ secrets.RENOVATE_TOKEN }}"
        env:
          LOG_LEVEL: "debug"
